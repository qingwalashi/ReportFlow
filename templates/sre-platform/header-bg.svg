<svg viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 清爽前端风格背景 - 延长渐变，自然融入正文 -->
    <linearGradient id="mainBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff" /> <!-- 非常浅的天蓝顶部 -->
      <stop offset="60%" stop-color="#f8fafc" /> <!-- 近白色中部 -->
      <stop offset="100%" stop-color="#f8fafc" /> <!-- 与正文背景色一致，不是纯白 -->
    </linearGradient>

    <!-- 顶部科技光晕 - 更清新的蓝色调，范围更大 -->
    <radialGradient id="techGlow" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.07" /> <!-- 更亮的天蓝 -->
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.03" /> <!-- 清新青色 -->
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>

    <!-- 线路渐变 - 向下淡出更自然 -->
    <linearGradient id="lineFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.35" />
      <stop offset="40%" stop-color="#64748b" stop-opacity="0.2" />
      <stop offset="70%" stop-color="#64748b" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#64748b" stop-opacity="0" />
    </linearGradient>

    <!-- 六边形淡化遮罩 - 更长更自然的淡出，没有明显截止线 -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="1" />
      <stop offset="40%" stop-color="white" stop-opacity="0.7" />
      <stop offset="70%" stop-color="white" stop-opacity="0.3" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <mask id="hexMask">
      <rect width="1400" height="700" fill="url(#hexGrad)" />
    </mask>

    <!-- 点阵渐变遮罩 - 更长更自然 -->
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="1" />
      <stop offset="50%" stop-color="white" stop-opacity="0.5" />
      <stop offset="85%" stop-color="white" stop-opacity="0.1" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <mask id="dotMask">
      <rect width="1400" height="700" fill="url(#dotGrad)" />
    </mask>

    <!-- 六边形渐变描边 - 清新蓝→青 -->
    <linearGradient id="hexStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- 明亮天蓝 -->
      <stop offset="50%" stop-color="#06b6d4" /> <!-- 清新青色 -->
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>

    <!-- 点阵渐变填充 - 清新蓝绿 -->
    <radialGradient id="dotFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#14b8a6" />
    </radialGradient>

    <!-- 电路板线路渐变 - 清新蓝→灰 -->
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
  </defs>

  <!-- 背景基底 - 清爽干净，底部颜色与正文一致 -->
  <rect width="1400" height="700" fill="url(#mainBg)" />

  <!-- 顶部科技光晕 - 范围扩大，自然过渡 -->
  <rect width="1400" height="600" fill="url(#techGlow)" />

  <!-- ========== 机械/科技纹理层 ========== -->

  <!-- 1. 六边形网格背景 - 清新配色，自然淡出 -->
  <g mask="url(#hexMask)" opacity="0.12">
    <pattern id="hexPattern" patternUnits="userSpaceOnUse" width="70" height="60.62">
      <path d="M35,0 L70,17.5 L70,43.12 L35,60.62 L0,43.12 L0,17.5 Z"
            fill="none" stroke="url(#hexStroke)" stroke-width="1" />
    </pattern>
    <rect width="1400" height="700" fill="url(#hexPattern)" />
  </g>

  <!-- 2. 电路板线路 - 清新配色，延伸更长自然消失 -->
  <g stroke="url(#circuitGrad)" fill="none" stroke-width="1.2" opacity="0.25">
    <!-- 左侧线路群 -->
    <path d="M0,50 H140 V100 H220 V150 H300 V200 V280" />
    <path d="M80,50 V120 H160 V180 H240 V320" />
    <path d="M0,150 H100 V220 H180 V350" />
    <path d="M60,200 V280 H140 V380" />
    <path d="M0,300 H80 V400" />

    <!-- 中间线路群 -->
    <path d="M450,30 H580 V80 H680 V130 H780 V220" />
    <path d="M520,30 V110 H650 V170 H750 V300" />
    <path d="M600,80 V160 H720 V240 V360" />
    <path d="M550,200 H680 V280 H780 V400" />
    <path d="M620,280 V360 H720 V420" />

    <!-- 右侧线路群 -->
    <path d="M950,40 H1080 V90 H1180 V140 H1280 V240" />
    <path d="M1020,40 V120 H1150 V180 H1250 V320" />
    <path d="M1100,90 V170 H1220 V250 H1320 V380" />
    <path d="M1050,220 H1180 V300 H1280 V420" />
    <path d="M1150,300 V380 H1250 V450" />
    <path d="M1280,140 V220 H1400" />
    <path d="M1320,250 V320 H1400" />
  </g>

  <!-- 3. 电路板节点（小圆点）- 清新配色，自然消失 -->
  <g fill="url(#dotFill)" opacity="0.9">
    <!-- 顶部密集节点 -->
    <circle cx="140" cy="50" r="3" opacity="0.28" />
    <circle cx="220" cy="100" r="2.5" opacity="0.23" />
    <circle cx="300" cy="150" r="3" opacity="0.28" />
    <circle cx="80" cy="120" r="2.5" opacity="0.23" />
    <circle cx="160" cy="180" r="2.5" opacity="0.18" />
    <circle cx="100" cy="220" r="3" opacity="0.23" />
    <circle cx="140" cy="280" r="2.5" opacity="0.15" />
    <circle cx="80" cy="360" r="2" opacity="0.1" />

    <circle cx="580" cy="30" r="3" opacity="0.28" />
    <circle cx="680" cy="80" r="2.5" opacity="0.23" />
    <circle cx="520" cy="110" r="3" opacity="0.28" />
    <circle cx="650" cy="170" r="2.5" opacity="0.18" />
    <circle cx="720" cy="240" r="2.5" opacity="0.13" />
    <circle cx="680" cy="280" r="2" opacity="0.1" />
    <circle cx="720" cy="360" r="1.5" opacity="0.06" />

    <circle cx="1080" cy="40" r="3" opacity="0.28" />
    <circle cx="1180" cy="90" r="2.5" opacity="0.23" />
    <circle cx="1020" cy="120" r="3" opacity="0.28" />
    <circle cx="1150" cy="180" r="2.5" opacity="0.18" />
    <circle cx="1220" cy="250" r="2.5" opacity="0.13" />
    <circle cx="1280" cy="140" r="3" opacity="0.23" />
    <circle cx="1250" cy="300" r="2.5" opacity="0.1" />
    <circle cx="1180" cy="300" r="2" opacity="0.08" />
    <circle cx="1250" cy="380" r="1.5" opacity="0.05" />
  </g>

  <!-- 4. 机械刻度线 - 清新天蓝，延伸更长 -->
  <g stroke="#3b82f6" stroke-width="1.2" opacity="0.1">
    <!-- 左侧刻度 -->
    <line x1="0" y1="60" x2="35" y2="60" />
    <line x1="0" y1="110" x2="45" y2="110" />
    <line x1="0" y1="160" x2="30" y2="160" />
    <line x1="0" y1="210" x2="40" y2="210" />
    <line x1="0" y1="260" x2="35" y2="260" />
    <line x1="0" y1="310" x2="25" y2="310" />
    <line x1="0" y1="360" x2="30" y2="360" />
    <line x1="0" y1="410" x2="20" y2="410" />
    <line x1="0" y1="460" x2="15" y2="460" />

    <!-- 右侧刻度 -->
    <line x1="1365" y1="50" x2="1400" y2="50" />
    <line x1="1355" y1="100" x2="1400" y2="100" />
    <line x1="1370" y1="150" x2="1400" y2="150" />
    <line x1="1360" y1="200" x2="1400" y2="200" />
    <line x1="1370" y1="250" x2="1400" y2="250" />
    <line x1="1365" y1="300" x2="1400" y2="300" />
    <line x1="1375" y1="350" x2="1400" y2="350" />
    <line x1="1370" y1="400" x2="1400" y2="400" />
    <line x1="1378" y1="450" x2="1400" y2="450" />
  </g>

  <!-- 5. 科技装饰矩形 - 清新配色 -->
  <g fill="none" stroke="url(#hexStroke)" stroke-width="1" opacity="0.1">
    <!-- 左上角 -->
    <rect x="40" y="40" width="80" height="50" rx="6" />
    <rect x="55" y="55" width="40" height="20" rx="3" />

    <!-- 右上角 -->
    <rect x="1260" y="30" width="100" height="60" rx="6" />
    <rect x="1280" y="48" width="45" height="24" rx="3" />

    <!-- 中右部 -->
    <rect x="1120" y="130" width="120" height="70" rx="6" />
    <rect x="1140" y="152" width="50" height="26" rx="3" />
  </g>

  <!-- 6. 细密点阵网格 - 清新配色，自然淡出 -->
  <g mask="url(#dotMask)" opacity="0.07">
    <pattern id="dotPattern" patternUnits="userSpaceOnUse" width="28" height="28">
      <circle cx="14" cy="14" r="1.5" fill="url(#dotFill)" />
    </pattern>
    <rect width="1400" height="700" fill="url(#dotPattern)" />
  </g>

  <!-- 移除了突然变白的 bottomMask，现在整个背景自然过渡到与正文一致的 #f8fafc -->
</svg>
