<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ReportFlow">
  <defs>
    <linearGradient id="rf-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d5cf6"/>
      <stop offset="100%" stop-color="#5b8dff"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形底板 -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#rf-grad)"/>
  <!-- 三层数据流（自下而上由弱到强，呼应汇报的逐级提炼） -->
  <rect x="7"  y="21" width="14" height="2.4" rx="1.2" fill="#ffffff" opacity="0.55"/>
  <rect x="7"  y="15.5" width="18" height="2.4" rx="1.2" fill="#ffffff" opacity="0.78"/>
  <rect x="7"  y="10"  width="11" height="2.4" rx="1.2" fill="#ffffff"/>
  <!-- 智能洞察焦点 -->
  <circle cx="23" cy="11.2" r="2.2" fill="#ffffff"/>
  <circle cx="23" cy="11.2" r="0.9" fill="#2d5cf6"/>
</svg>
