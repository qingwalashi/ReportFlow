  <!-- 入场动画：内联以保证刷新时第一帧即可见，不被外部 CSS 加载顺序影响 -->
  <style>
    .rf-splash{
      position:fixed; inset:0; z-index:99999;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#f7f9fc 0%,#eaf1fb 60%,#dbe7f7 100%);
    }
    /* 淡出由 JS 在「前端真正就绪」时触发（preview:rendered），不再用固定时间 */
    .rf-splash.is-leaving{ animation:rf-splash-fade .45s ease forwards; }
    .rf-splash[hidden]{ display:none !important; }
    .rf-splash__inner{
      display:flex; flex-direction:column; align-items:center; gap:18px;
      transform:translateY(-2vh);
    }
    .rf-splash__logo{
      width:96px; height:96px; display:block;
      filter:drop-shadow(0 10px 28px rgba(31,87,184,.25));
      animation:rf-splash-pop .7s cubic-bezier(.2,.8,.2,1) both,
                rf-splash-breath 1.6s ease-in-out .7s infinite;
    }
    .rf-splash__name{
      font:600 22px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      letter-spacing:.5px; color:#1f57b8;
      opacity:0; animation:rf-splash-rise .5s ease .25s forwards;
    }
    .rf-splash__tag{
      font:400 13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      color:#5a6b85; letter-spacing:1px;
      opacity:0; animation:rf-splash-rise .5s ease .4s forwards;
    }
    .rf-splash__bar{
      margin-top:6px; width:120px; height:3px; border-radius:3px;
      background:rgba(31,87,184,.12); overflow:hidden; position:relative;
    }
    .rf-splash__bar::after{
      content:""; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent,#1f57b8,transparent);
      transform:translateX(-100%);
      animation:rf-splash-slide 1.1s ease-in-out infinite;
    }
    @keyframes rf-splash-pop{
      0%{ transform:scale(.6); opacity:0; }
      60%{ transform:scale(1.08); opacity:1; }
      100%{ transform:scale(1); opacity:1; }
    }
    @keyframes rf-splash-breath{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.04); }
    }
    @keyframes rf-splash-rise{
      from{ opacity:0; transform:translateY(6px); }
      to{ opacity:1; transform:translateY(0); }
    }
    @keyframes rf-splash-slide{
      0%{ transform:translateX(-100%); }
      100%{ transform:translateX(100%); }
    }
    @keyframes rf-splash-fade{
      to{ opacity:0; visibility:hidden; }
    }
    @media (prefers-reduced-motion: reduce){
      .rf-splash, .rf-splash__logo, .rf-splash__name, .rf-splash__tag, .rf-splash__bar::after{
        animation-duration:.2s !important; animation-iteration-count:1 !important;
      }
    }
  </style>
</head>
<body>
  <!-- 入场画面：刷新时即可见，约 1.4s 后自动淡出移除 -->
  <div class="rf-splash" id="rf-splash" role="status" aria-label="正在加载">
    <div class="rf-splash__inner">
      <img class="rf-splash__logo" src="assets/brand/logo.svg" alt="ReportFlow" width="96" height="96" />
      <div class="rf-splash__name">ReportFlow</div>
      <div class="rf-splash__tag">智能汇报工作台</div>
      <div class="rf-splash__bar" aria-hidden="true"></div>
    </div>
  </div>
  <script>
    // 启动画面在「前端真正就绪」时淡出：
    //   就绪信号 = preview.js 渲染完首帧后发出的 RF_Bus 事件 "preview:rendered"
    //   （iframe ready 仅代表空壳加载完，CSS/报告/图表尚未上屏，故不采用）。
    // 同时保证最短展示时间，让入场动画完整播放；并设兜底超时，避免事件丢失时卡住。
    (function(){
      var el = document.getElementById('rf-splash');
      if(!el) return;
      var START = (window.performance && performance.now) ? performance.now() : 0;
      var MIN_MS = 900;     // 最短展示，入场动画完整播放
      var FALLBACK_MS = 6000; // 兜底：即使从未就绪也不长期遮挡
      var done = false, leaving = false;

      var unmount = function(){
        if(done) return; done = true;
        el.setAttribute('hidden','');
        setTimeout(function(){ el.parentNode && el.parentNode.removeChild(el); }, 50);
      };
      var startLeave = function(){
        if(leaving) return; leaving = true;
        el.classList.add('is-leaving');
        // 动画结束后卸载；并设短兜底以防 animationend 丢失
        el.addEventListener('animationend', function(e){
          if(e.animationName === 'rf-splash-fade') unmount();
        });
        setTimeout(unmount, 700);
      };
      var requestLeave = function(){
        var now = (window.performance && performance.now) ? performance.now() : MIN_MS;
        var waited = now - START;
        if(waited >= MIN_MS) startLeave();
        else setTimeout(startLeave, MIN_MS - waited);
      };

      // 主信号：预览首帧渲染完成 = 前端完全加载
      function bindReady(){
        if(window.RF_Bus && window.RF_Bus.once){
          window.RF_Bus.once('preview:rendered', requestLeave);
          return true;
        }
        return false;
      }
      if(!bindReady()){
        // 模块脚本是 defer，可能晚于本内联脚本就绪：轮询挂载
        var tries = 0, t = setInterval(function(){
          if(bindReady() || ++tries > 200){ clearInterval(t); }
        }, 30);
      }
      // 兜底：无论是否收到就绪事件，超时后强制淡出
      setTimeout(requestLeave, FALLBACK_MS);
    })();
  </script>
  <header class="rf-topbar">
    <div class="rf-brand">
      <img class="rf-brand__mark" src="assets/brand/logo.svg" alt="" width="28" height="28" />
      <span class="rf-brand__name">ReportFlow</span>
      <span class="rf-brand__tag">智能汇报工作台</span>
    </div>

    <div class="rf-topbar__center">
      <div class="rf-mode-switch" role="tablist" aria-label="工作模式">
        <button class="rf-mode-switch__btn is-active" id="rf-mode-standard"
                role="tab" aria-selected="true" data-mode="standard"
                title="标准模式：显示自然语言、结构化编辑、预览三栏">
          <span class="rf-mode-switch__icon" aria-hidden="true">▦</span>
          <span>标准模式</span>
        </button>
        <button class="rf-mode-switch__btn" id="rf-mode-suggest"
                role="tab" aria-selected="false" data-mode="suggest"
                title="简易模式：仅显示自然语言录入与实时预览，隐藏结构化编辑">
          <span class="rf-mode-switch__icon" aria-hidden="true">◫</span>
          <span>简易模式</span>
        </button>
      </div>

      <div class="rf-spacer" aria-hidden="true"></div>

      <!-- 模板选择：外观与左侧"模式切换"胶囊一致；
           隐藏 <select> 仍是数据源（populateTemplateSelect / change 事件不变），
           rf-template-switch 的 JS 在打开时按 options 渲染菜单，选中后写回 select.value。 -->
      <div class="rf-template-switch" role="group" aria-label="模板">
        <button type="button" class="rf-template-switch__btn" id="rf-template-trigger"
                aria-haspopup="listbox" aria-expanded="false"
                title="切换报告模板">
          <span class="rf-template-switch__icon" aria-hidden="true">▤</span>
          <span class="rf-template-switch__kind">模板</span>
          <span class="rf-template-switch__sep" aria-hidden="true"></span>
          <span class="rf-template-switch__label" id="rf-template-trigger-label">—</span>
          <span class="rf-template-switch__caret" aria-hidden="true">▾</span>
        </button>
        <div class="rf-template-switch__menu" id="rf-template-menu" role="listbox" hidden></div>
        <select id="rf-template-select" class="rf-template-switch__native" aria-hidden="true" tabindex="-1"></select>
      </div>
    </div>

    <nav class="rf-topbar__actions">
      <button class="rf-btn rf-btn--danger" id="rf-btn-clear" title="清空当前报告所有内容">
        <span class="rf-icon">🗑</span><span>清空</span>
      </button>
      <button class="rf-btn rf-btn--ghost" id="rf-btn-history" data-mobile="hide" title="历史报告 (Ctrl+H)">
        <span class="rf-icon">⏱</span><span>历史</span>
      </button>
      <button class="rf-btn rf-btn--ghost" id="rf-btn-settings" data-mobile="hide" title="大模型设置">
        <span class="rf-icon">⚙</span><span>设置</span>
      </button>
      <button class="rf-btn rf-btn--ghost" id="rf-btn-help" data-mobile="hide" title="帮助">
        <span class="rf-icon">?</span><span>帮助</span>
      </button>
      <!-- 仅移动端可见：把上面三个按钮折进去，避免顶栏拥挤。点击代理到原按钮，保留所有逻辑。 -->
      <div class="rf-mobile-more" id="rf-mobile-more">
        <button class="rf-btn rf-btn--ghost rf-mobile-more__btn" id="rf-btn-mobile-more"
                type="button" aria-haspopup="menu" aria-expanded="false" aria-label="更多" title="更多">
          <span aria-hidden="true">⋮</span>
        </button>
        <div class="rf-mobile-more__menu" id="rf-mobile-menu" role="menu" hidden>
          <button class="rf-mobile-more__item" type="button" data-action="history" role="menuitem">
            <span class="rf-icon" aria-hidden="true">⏱</span><span>历史</span>
          </button>
          <button class="rf-mobile-more__item" type="button" data-action="settings" role="menuitem">
            <span class="rf-icon" aria-hidden="true">⚙</span><span>设置</span>
          </button>
          <button class="rf-mobile-more__item" type="button" data-action="help" role="menuitem">
            <span class="rf-icon" aria-hidden="true">?</span><span>帮助</span>
          </button>
        </div>
      </div>
    </nav>
  </header>

  <main class="rf-workspace">
    <!-- 左：自然语言录入 -->
    <section class="rf-pane rf-pane--input" aria-label="自然语言录入">
      <div class="rf-pane__head">
        <h2 class="rf-pane__title">自然语言录入</h2>
        <div class="rf-pane__hint">粘贴或键入任意排版文本，点击「解析」自动结构化。</div>
        <button class="rf-pane__collapse" id="rf-btn-collapse-input"
                type="button"
                aria-label="折叠自然语言录入"
                aria-expanded="true"
                title="折叠/展开（自然语言录入）">
          <span class="rf-pane__collapse-icon" aria-hidden="true">‹</span>
        </button>
      </div>
      <textarea
        id="rf-input-text"
        class="rf-input-text"
        spellcheck="false"
        placeholder="例如：本季度市场部完成华东、华南两个大区的渠道拓展，营收同比增长 18%；客户满意度 92 分；下季度计划……"></textarea>
      <!-- 导入图片预览面板 -->
      <div id="rf-imported-images" class="rf-imported-images" hidden>
        <div class="rf-imported-images__head">
          <span class="rf-imported-images__title">📷 已导入图片</span>
          <span class="rf-imported-images__count" id="rf-imported-images-count"></span>
        </div>
        <div class="rf-imported-images__grid" id="rf-imported-images-grid"></div>
      </div>
      <div class="rf-pane__foot">
        <button class="rf-btn rf-btn--primary" id="rf-btn-parse" title="解析 (Ctrl+Enter)">
          <span class="rf-icon">⚡</span><span>解析</span>
        </button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-rewrite-sel"
                title="请先在文本框中选中要改写的内容" disabled>
          <span class="rf-icon">✎</span><span>AI 改写选区</span>
        </button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-import-docx" title="从 Word 文档 (.docx) 导入文字和图片">
          <span class="rf-icon">📄</span><span>导入 Word</span>
        </button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-chart-suggestion" title="AI 识别适合添加图表的位置并插入建议标记">
          <span class="rf-icon">📊</span><span>图表建议</span>
        </button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-load-sample">载入示例</button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-clear-input">清空</button>
      </div>
      <!-- 折叠态下的窄条：竖排显示标题，整条可点击展开 -->
      <button class="rf-pane__rail" id="rf-btn-expand-input"
              type="button"
              aria-label="展开自然语言录入"
              title="展开自然语言录入">
        <span class="rf-pane__rail-icon" aria-hidden="true">›</span>
        <span class="rf-pane__rail-title">自然语言录入</span>
      </button>
    </section>

    <div class="rf-splitter" data-target="prev"></div>

    <!-- 中：结构化编辑 -->
    <section class="rf-pane rf-pane--edit" aria-label="结构化编辑">
      <div class="rf-pane__head">
        <h2 class="rf-pane__title">结构化编辑</h2>
        <div class="rf-pane__hint">所见即所得，修改后右侧实时预览。</div>
      </div>
      <div class="rf-edit-scroll">
        <div id="rf-editor-root" class="rf-editor"></div>
      </div>
      <div class="rf-pane__foot">
        <button class="rf-btn rf-btn--ghost" id="rf-btn-add-section">+ 新增章节</button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-paste-table" title="从剪贴板粘贴 Excel 表格">📋 粘贴表格</button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-smart-highlight" title="AI 识别关键数字/结论并高亮">🖍️ 智能高亮</button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-clear-highlight" title="清除正文与表格上的所有高亮">🧹 清除高亮</button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-generate-summary" title="AI 生成报告摘要">📝 生成摘要</button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-snapshot" title="保存到历史 (Ctrl+S)">📌 存为快照</button>
      </div>
    </section>

    <div class="rf-splitter" data-target="next"></div>

    <!-- 右：实时预览 -->
    <section class="rf-pane rf-pane--preview" aria-label="实时预览">
      <div class="rf-pane__head">
        <h2 class="rf-pane__title">实时预览</h2>
        <div class="rf-pane__hint" id="rf-preview-hint">公务正式 · 桌面视图</div>
      </div>
      <div class="rf-preview-frame-wrap">
        <iframe
          id="rf-preview-frame"
          class="rf-preview-frame"
          title="报告预览"
          sandbox="allow-same-origin allow-scripts allow-popups"></iframe>
      </div>
      <div class="rf-pane__foot">
        <button class="rf-btn rf-btn--primary" id="rf-btn-export-zip">
          <span class="rf-icon">📦</span><span>导出 ZIP</span>
        </button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-export-pdf">
          <span class="rf-icon">📄</span><span>导出 PDF</span>
        </button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-export-docx">
          <span class="rf-icon">📝</span><span>导出 Word</span>
        </button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-export-html">
          <span class="rf-icon">🌐</span><span>导出 HTML</span>
        </button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-export-png">
          <span class="rf-icon">🖼</span><span>导出 PNG</span>
        </button>
        <button class="rf-btn rf-btn--ghost" id="rf-btn-fullscreen-preview" title="全屏预览">⛶</button>
      </div>
    </section>
  </main>

  <footer class="rf-statusbar">
    <span class="rf-status rf-status--ok" id="rf-status-save">●&nbsp;已保存</span>
    <span class="rf-status" id="rf-status-template">模板：—</span>
    <span class="rf-status" id="rf-status-storage">存储：—</span>
    <span class="rf-status rf-status--right" id="rf-status-version">v0.1 · 纯静态</span>
  </footer>

  <!-- 模态根 -->
  <div id="rf-modal-root" class="rf-modal-root" hidden></div>
  <!-- Toast 根 -->
  <div id="rf-toast-root" class="rf-toast-root" aria-live="polite"></div>

  <script defer src="js/modules/chart-adapter.js"></script>

  <script defer src="js/modules/docx-import.js"></script>

  <script defer src="js/modules/renderer-host.js"></script>
  <script defer src="js/modules/preview.js"></script>

  <script defer src="templates/formal-gov/render.js"></script>
  <script defer src="templates/mono-print/render.js"></script>
  <script defer src="templates/tech-minimal/render.js"></script>

  <script defer src="js/core/bootstrap.js"></script>
</body>
</html>
